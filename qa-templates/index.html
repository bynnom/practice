<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bynnom | QA Templates</title>
    <link rel="icon" href="../assets/images/logo.png" />
    <link rel="stylesheet" href="../assets/styles/main.css" />
  </head>
  <body class="templates-page">
    <header class="home-nav">
      <a class="home-brand" href="../" aria-label="Bynnom home">
        <img class="brand-logo" src="../assets/images/logo.png" alt="Bynnom logo" />
        <span>Bynnom</span>
      </a>
      <nav class="home-nav-actions" aria-label="Main navigation">
        <a id="studyHubAccessLink" class="site-nav-link" href="../study-hub/">Study Hub</a>
        <a class="site-nav-link" href="./" aria-current="page">QA Templates</a>
        <a class="site-nav-link" href="../it-tools/">IT Tools</a>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch to light mode" aria-pressed="false">
        <span class="theme-toggle-icon" aria-hidden="true"></span>
        <span class="theme-toggle-label">Dark</span>
      </button>
    </header>

    <main class="templates-shell">
      <section class="tools-workspace template-workspace" aria-label="QA template workspace">
        <aside class="tools-menu template-menu" aria-label="QA template options">
          <a
            class="tool-option active"
            href="#release-confirmation-template"
            data-template-target="release-confirmation-template"
            aria-current="true"
          >
            <strong>Release Confirmation</strong>
          </a>
        </aside>

        <section class="tool-panel template-panel" aria-label="QA templates">
          <div class="template-library">
            <article id="release-confirmation-template" class="template-copy-card" data-template-panel>
              <div class="template-copy-head">
                <div>
                  <h2>Release Confirmation</h2>
                  <p>Copy this release verification summary when a release is ready to confirm.</p>
                </div>
                <button id="releaseConfirmationCopy" class="secondary-btn" type="button">Copy</button>
              </div>
              <textarea readonly aria-label="Release Confirmation template">Release Confirmation – vX.Y.Z (&lt;Environment&gt;)

1. Verified Tickets (Re-confirm/Sanity Test)
* &lt;Ticket ID + Title&gt; — Pass
* &lt;Ticket ID + Title&gt; — Pass

2. Test Result (Regression/Smoke Test)
* Total: &lt;number&gt;
* ✅ Passed: &lt;number&gt;
* ❌ Failed: &lt;number&gt;
* ⏭ Skipped: &lt;number&gt;

3. Issues
* N/A
* &lt;Issue ID + Summary&gt;

4. Status
* ✅ Verification completed successfully.
* ⚠️ Verification completed with known issues.
* ❌ Verification failed due to critical/high severity issues.

📎 Release Note: &lt;Link&gt;
👥 cc: &lt;Team/Everyone&gt;</textarea>
            </article>
          </div>
        </section>
      </section>
    </main>

    <dialog id="studyHubLoginDialog" class="auth-dialog" tabindex="-1">
      <form id="studyHubLoginForm" class="auth-card" method="dialog">
        <div>
          <p class="auth-kicker">Private access</p>
          <h2>Study Hub login</h2>
        </div>
        <label>
          Username
          <input id="studyHubUsername" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="studyHubPassword" autocomplete="current-password" required type="password" />
        </label>
        <p id="studyHubLoginError" class="auth-error" role="alert"></p>
        <div class="auth-actions">
          <button id="studyHubLoginCancel" class="secondary-btn" type="button">Cancel</button>
          <button class="primary-btn" type="submit">Continue</button>
        </div>
      </form>
    </dialog>

    <script src="../assets/scripts/auth.js" defer></script>
    <script src="../assets/scripts/back-to-top.js" defer></script>
    <script src="../assets/scripts/theme.js" defer></script>
    <script src="../assets/scripts/templates.js" defer></script>
  </body>
</html>
